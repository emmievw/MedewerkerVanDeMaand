<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Medewerker van de Maand</title>
    <link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <span class="logo">Medewerker van de Maand</span>
            <span class="nav-month">Admin</span>
        </div>
    </nav>

    <main class="main">
        <div class="container">
            <!-- Login sectie -->
            <section id="login-section" class="login-section">
                <h1>Admin Login</h1>
                <form id="login-form" class="vote-form" style="max-width: 400px; margin: 0 auto;">
                    <div class="form-group">
                        <label for="admin-password">Wachtwoord</label>
                        <input type="password" id="admin-password" required placeholder="Voer het admin wachtwoord in">
                    </div>
                    <button type="submit" class="btn-primary">Inloggen</button>
                    <div id="login-error" class="error-message" style="display:none;">
                        <p>Onjuist wachtwoord</p>
                    </div>
                </form>
            </section>

            <!-- Dashboard sectie -->
            <section id="dashboard-section" style="display:none;">
                <div class="dashboard-header">
                    <h1>📊 Resultaten</h1>
                    <button id="refresh-btn" class="btn-secondary">🔄 Vernieuwen</button>
                </div>

                <!-- Stats -->
                <div class="stats-row">
                    <div class="stat-card">
                        <div class="stat-number" id="total-votes">-</div>
                        <div class="stat-label">Stemmen</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="total-remaining">-</div>
                        <div class="stat-label">Resterend</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="current-leader">-</div>
                        <div class="stat-label">Koploper</div>
                    </div>
                </div>

                <!-- Ranking -->
                <div class="vote-form">
                    <h2 style="margin-bottom: 1rem;">🏆 Ranking</h2>
                    <div id="ranking-list">
                        <p class="loading">Laden...</p>
                    </div>
                </div>

                <!-- Alle stemmen -->
                <div class="vote-form" style="margin-top: 1.5rem;">
                    <h2 style="margin-bottom: 1rem;">📝 Alle stemmen</h2>
                    <div id="votes-list">
                        <p class="loading">Laden...</p>
                    </div>
                </div>

                <!-- Setup instructie (verborgen na configuratie) -->
                <div id="setup-notice" class="vote-form" style="margin-top: 1.5rem; display: none;">
                    <h2 style="margin-bottom: 0.5rem;">⚠️ Sheet ID nodig</h2>
                    <p style="color: var(--text-medium);">Open je Google Sheet, kopieer het ID uit de URL en vul het in in <code>js/admin.js</code></p>
                </div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 — Medewerker van de Maand (Admin)</p>
    </footer>

    <script src="js/admin.js?v=4"></script>
</body>
</html>
