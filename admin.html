<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Medewerker van de Maand</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>">
    <link rel="stylesheet" href="css/style.css?v=4">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <span class="logo">Medewerker van de Maand</span>
            <span class="nav-month">Admin</span>
        </div>
    </nav>

    <main class="main">
        <div class="container">
            <!-- Login sectie -->
            <section id="login-section" class="login-section">
                <h1>Admin Login</h1>
                <form id="login-form" class="vote-form" style="max-width: 400px; margin: 0 auto;">
                    <div class="form-group">
                        <label for="admin-password">Wachtwoord</label>
                        <input type="password" id="admin-password" required placeholder="Voer het admin wachtwoord in">
                    </div>
                    <button type="submit" class="btn-primary">Inloggen</button>
                    <div id="login-error" class="error-message" style="display:none;">
                        <p>Onjuist wachtwoord</p>
                    </div>
                </form>
            </section>

            <!-- Dashboard sectie -->
            <section id="dashboard-section" style="display:none;">
                <div class="dashboard-header">
                    <h1>📊 Resultaten</h1>
                    <span class="stat-label" id="vote-count-label"></span>
                </div>

                <!-- Stem toevoegen -->
                <div class="vote-form admin-add-form">
                    <h2>➕ Stem toevoegen</h2>
                    <p class="admin-hint">Voer hier de stemmen in die je per email ontvangt</p>
                    <form id="add-vote-form">
                        <div class="form-group">
                            <label for="add-nominee">Genomineerde</label>
                            <input type="text" id="add-nominee" required placeholder="Naam collega">
                        </div>
                        <div class="form-group">
                            <label for="add-motivation">Motivatie</label>
                            <textarea id="add-motivation" required placeholder="Waarom deze collega?"></textarea>
                        </div>
                        <button type="submit" class="btn-primary">Stem toevoegen</button>
                    </form>
                </div>

                <!-- Ranking -->
                <div class="vote-form" style="margin-top: 1.5rem;">
                    <h2>🏆 Ranking</h2>
                    <div id="ranking-list">
                        <p class="loading">Nog geen stemmen ingevoerd.</p>
                    </div>
                </div>

                <!-- Alle stemmen -->
                <div class="vote-form" style="margin-top: 1.5rem;">
                    <h2>📝 Alle stemmen</h2>
                    <div id="votes-list">
                        <p class="loading">Nog geen stemmen ingevoerd.</p>
                    </div>
                </div>

                <!-- Acties -->
                <div class="vote-form admin-actions" style="margin-top: 1.5rem;">
                    <h2>⚙️ Acties</h2>
                    <button id="export-reveal-btn" class="btn-secondary">📤 Exporteer voor reveal-pagina</button>
                    <button id="clear-btn" class="btn-danger">🗑️ Wis alle stemmen</button>
                </div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 — Medewerker van de Maand (Admin)</p>
    </footer>

    <script src="js/admin.js?v=5"></script>
</body>
</html>
